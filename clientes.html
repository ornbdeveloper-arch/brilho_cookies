<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brilho Cookies — Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app" class="app">
    <main id="main-content">
      <div class="page-header">
        <div>
          <h1>Clientes 👥</h1>
          <p class="subtitle">Cadastre quem comprar — usamos o CPF para o ranking de fidelidade.</p>
        </div>
        <button class="btn" id="btn-new">+ Novo cliente</button>
      </div>

      <div class="filters">
        <input id="filter-text" placeholder="🔍 Buscar por nome, CPF ou contato..." />
      </div>

      <div id="customer-list"></div>
    </main>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/layout.js"></script>
  <script>
    renderLayout("clientes");
    const listEl = document.getElementById("customer-list");

    function render() {
      const term = document.getElementById("filter-text").value.toLowerCase().trim();
      let customers = customerStore.list();
      if (term) {
        customers = customers.filter((c) =>
          c.name.toLowerCase().includes(term) ||
          c.cpf.includes(term) ||
          (c.contact || "").toLowerCase().includes(term));
      }
      if (!customers.length) {
        listEl.innerHTML = `<div class="empty">
          <div class="emoji">👥</div>
          <h3>Nenhum cliente cadastrado</h3>
          <p>Adicione seu primeiro cliente para começar a registrar vendas.</p>
        </div>`;
        return;
      }
      const sales = saleStore.list();
      listEl.innerHTML = `<div class="table-wrap"><table>
        <thead><tr><th>Nome</th><th>CPF</th><th>Contato</th><th>Compras</th><th></th></tr></thead>
        <tbody>${customers.map((c) => {
          const cs = sales.filter((s) => s.customerCpf === c.cpf);
          return `<tr>
            <td><strong>${c.name}</strong></td>
            <td>${fmt.cpf(c.cpf)}</td>
            <td>${c.contact || "—"}</td>
            <td><span class="badge info">${cs.length} venda(s)</span></td>
            <td style="text-align:right;">
              <button class="btn secondary sm" data-edit="${c.id}">✏️</button>
              <button class="btn ghost sm" data-del="${c.id}">🗑️</button>
            </td>
          </tr>`;
        }).join("")}</tbody></table></div>`;

      listEl.querySelectorAll("[data-edit]").forEach((b) =>
        b.onclick = () => openForm(customerStore.get(b.dataset.edit)));
      listEl.querySelectorAll("[data-del]").forEach((b) =>
        b.onclick = async () => {
          const ok = await confirmModal({ title: "Excluir cliente?", message: "As vendas associadas continuarão registradas." });
          if (ok) { customerStore.remove(b.dataset.del); toast("Cliente removido", "success"); render(); }
        });
    }

    function openForm(customer) {
      const isEdit = !!customer;
      const data = customer || { name: "", cpf: "", contact: "" };
      const form = document.createElement("div");
      form.innerHTML = `
        <div class="field"><label>Nome *</label><input id="f-name" value="${data.name}" required /></div>
        <div class="form-row">
          <div class="field"><label>CPF *</label><input id="f-cpf" value="${data.cpf}" placeholder="000.000.000-00" maxlength="14" /></div>
          <div class="field"><label>Contato</label><input id="f-contact" value="${data.contact}" placeholder="WhatsApp, email..." /></div>
        </div>`;
      maskCpf(form.querySelector("#f-cpf"));

      openModal({
        title: isEdit ? "Editar cliente" : "Novo cliente",
        subtitle: "O CPF é usado como chave única para o ranking de fidelidade.",
        body: form,
        confirmText: isEdit ? "Salvar" : "Cadastrar",
        onConfirm: () => {
          const name = form.querySelector("#f-name").value.trim();
          const cpf = form.querySelector("#f-cpf").value.trim();
          const contact = form.querySelector("#f-contact").value.trim();
          if (!name || !cpf) { toast("Nome e CPF são obrigatórios", "error"); return false; }
          if (cpf.replace(/\D/g, "").length !== 11) { toast("CPF inválido", "error"); return false; }
          const exists = customerStore.getByCpf(cpf);
          if (exists && (!isEdit || exists.id !== customer.id)) { toast("CPF já cadastrado", "error"); return false; }
          if (isEdit) customerStore.update(customer.id, { name, cpf, contact });
          else customerStore.create({ name, cpf, contact });
          toast(isEdit ? "Cliente atualizado!" : "Cliente cadastrado!", "success");
          render();
        },
      });
    }

    document.getElementById("btn-new").onclick = () => openForm(null);
    document.getElementById("filter-text").oninput = render;
    render();
  </script>
</body>
</html>
